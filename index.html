
<!DOCTYPE HTML>
<html>
<head>
    <title>HUGO RETA | Filmmaker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reseteo y pantalla completa */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* Contenedor del vídeo de fondo */
        .vimeo-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .vimeo-wrapper iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* Capa sutil para mejorar legibilidad inferior */
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 25%; background: linear-gradient(transparent, rgba(0,0,0,0.5)); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 40px; }

        /* Título pequeño y minimalista encima de los botones */
        h1 { color: white; font-size: 0.9rem; letter-spacing: 4px; font-weight: 300; text-transform: uppercase; margin-bottom: 20px; opacity: 0.8; }

        /* Contenedor de botones */
        .buttons { display: flex; gap: 15px; }

        /* Botones pequeños y redondeados */
        .btn { 
            padding: 8px 18px; 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            border-radius: 20px; /* Esquinas muy redondeadas */
            color: white; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 0.65rem; /* Muy pequeños */
            letter-spacing: 1.5px; 
            transition: all 0.4s ease;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px); /* Un toque de desenfoque moderno */
        }

        /* Efecto al pasar el ratón */
        .btn:hover { 
            background: white; 
            color: black; 
            border-color: white;
            transform: translateY(-2px); /* Sutil levantamiento */
        }
    </style>
</head>
<body>
    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/1175946451?background=1&autoplay=1&loop=1&byline=0&title=0&muted=1" frameborder="0"></iframe>
    </div>
    
    <div class="overlay">
        <h1>HUGO RETA</h1>
        <div class="buttons">
            <a href="portfolio.html" class="btn">Portfolio</a>
            <a href="myself.html" class="btn">Myself</a>
        </div>
    </div>
</body>
</html>
