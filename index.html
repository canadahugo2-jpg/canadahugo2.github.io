<!DOCTYPE HTML>
<html lang="es">
<head>
    <title>HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* NOMBRE ARRIBA - ESTILO CRÉDITOS DE CINE */
        .brand {
            position: absolute;
            top: 10vh;
            width: 100%;
            text-align: center;
            z-index: 20;
        }
        .brand h1 {
            color: #fff;
            font-size: 1.8rem; /* Tamaño con presencia */
            font-weight: 200;
            letter-spacing: 25px; /* Interlineado horizontal muy alto */
            text-transform: uppercase;
            text-indent: 25px; /* Para centrar perfecto por el espaciado final */
            opacity: 0.9;
        }

        /* VIDEO */
        .vimeo-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .vimeo-wrapper iframe { 
            width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
        }

        /* INTERFAZ */
        .overlay { 
            position: relative; z-index: 10; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; padding-bottom: 12vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, transparent 40%, rgba(0,0,0,0.6) 100%);
        }
        
        /* BOTONES GRANDES PARA ORDENADOR */
        .buttons { display: flex; gap: 40px; }
        .btn { 
            padding: 22px 60px; /* Botones mucho más grandes */
            border: 1.5px solid #fff; 
            color: #fff; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            font-size: 1rem; /* Letra clara y grande */
            border-radius: 60px; 
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1); 
            background: rgba(0,0,0,0.2); 
            backdrop-filter: blur(10px);
        }
        .btn:hover { background: #fff; color: #000; transform: scale(1.05); }

        /* AJUSTE MÓVIL */
        @media (max-width: 768px) {
            .brand h1 { font-size: 1rem; letter-spacing: 12px; text-indent: 12px; }
            .vimeo-wrapper iframe { height: 70vh; top: 0; transform: translateX(-50%); }
            .overlay { background: linear-gradient(to bottom, transparent 50%, #000 100%); }
            .buttons { flex-direction: column; width: 80%; gap: 20px; }
            .btn { padding: 20px; font-size: 0.9rem; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="brand"><h1>HUGO RETA</h1></div>
    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/1175946451?background=1&autoplay=1&loop=1&muted=1" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>
    <div class="overlay"><div class="buttons"><a href="portfolio.html" class="btn">Portfolio</a><a href="myself.html" class="btn">Myself</a></div></div>
</body>
</html>
