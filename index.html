<!DOCTYPE HTML>
<html>
<head>
    <title>HUGO RETA | Director</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        .vimeo-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .vimeo-wrapper iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .buttons { display: flex; gap: 20px; }
        .btn { padding: 15px 30px; border: 2px solid white; color: white; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn:hover { background: white; color: black; }
        h1 { font-size: 3rem; letter-spacing: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/1175946451?background=1&autoplay=1&loop=1&byline=0&title=0&muted=1" frameborder="0"></iframe>
    </div>
    <div class="overlay">
        <h1>HUGO RETA</h1>
        <div class="buttons">
            <a href="portfolio.html" class="btn">Portfolio</a>
            <a href="myself.html" class="btn">Myself</a>
        </div>
    </div>
</body>
</html>
