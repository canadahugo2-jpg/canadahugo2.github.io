<!DOCTYPE HTML>
<html>
<head>
    <title>PORTFOLIO | HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* Navegación Minimal */
        nav { padding: 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; }
        nav a { color: white; text-decoration: none; text-transform: uppercase; letter-spacing: 3px; font-size: 0.7rem; font-weight: 300; transition: 0.3s; opacity: 0.7; }
        nav a:hover { opacity: 1; }

        /* Cuadrícula de Fotos */
        .photo-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(45%, 1fr)); 
            gap: 10px; 
            padding: 0 10px 100px 10px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .photo-item { position: relative; overflow: hidden; background: #0a0a0a; line-height: 0; }
        .photo-item img { 
            width: 100%; 
            height: auto; 
            display: block; 
            transition: transform 0.8s ease;
            filter: grayscale(20%); /* Un toque de estilo para que todas unifiquen */
        }
        .photo-item:hover img { transform: scale(1.03); filter: grayscale(0%); }

        /* Pie de foto sutil */
        .photo-info { padding: 15px 5px; }
        .photo-info span { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #666; }

        /* Móvil */
        @media (max-width: 768px) {
            .photo-grid { grid-template-columns: 1fr; padding: 0 15px 50px 15px; }
            nav { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">← Index</a>
        <a href="myself.html">Myself</a>
    </nav>

    <div class="photo-grid">
        
        <div class="photo-item">
            <img src="URL_DE_TU_FOTO_1.jpg" alt="Proyecto Hugo Reta">
            <div class="photo-info"><span>Lanzarote / 2026</span></div>
        </div>

        <div class="photo-item">
            <img src="URL_DE_TU_FOTO_2.jpg" alt="Proyecto Hugo Reta">
            <div class="photo-info"><span>Production / 02</span></div>
        </div>

        <div class="photo-item">
            <img src="URL_DE_TU_FOTO_3.jpg" alt="Proyecto Hugo Reta">
            <div class="photo-info"><span>Portrait / 03</span></div>
        </div>

    </div>

</body>
</html>
