<!DOCTYPE HTML>
<html lang="es">
<head>
    <title>HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* --- 1. RESET Y ARQUITECTURA BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #000; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
        }

        /* --- 2. EL NOMBRE (BRANDING DE ALTA GAMA) --- */
        .brand {
            position: absolute;
            top: 15vh; /* Bajamos un poco más para que tenga aire */
            width: 100%;
            text-align: center;
            z-index: 50;
            pointer-events: none;
        }
        .brand h1 {
            color: #fff;
            font-size: 3rem; /* TAMAÑO IMPACTANTE EN PC */
            font-weight: 201;
            letter-spacing: 35px; /* ESPACIADO CINEMATOGRÁFICO */
            text-transform: uppercase;
            text-indent: 35px;
            opacity: 0.95;
            animation: fadeIn 2s ease-in;
        }

        /* --- 3. EL VÍDEO (CONTROL TOTAL DE ENCUADRE) --- */
        .vimeo-wrapper { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 0; pointer-events: none; 
        }
        
        /* ESCALA PARA ORDENADOR (FULLSCREEN SIN BORDES) */
        @media (min-width: 769px) {
            .vimeo-wrapper iframe { 
                width: 100vw; height: 56.25vw; /* 16:9 ratio */
                min-height: 100vh; min-width: 177.77vh; 
                position: absolute; top: 50%; left: 50%; 
                transform: translate(-50%, -50%); 
            }
        }

        /* --- 4. LA INTERFAZ Y EL "BLEND" (DEGRADADO MAESTRO) --- */
        .overlay { 
            position: relative; z-index: 10; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; 
            padding-bottom: 15vh; /* Espacio inferior en PC */
            /* Degradado sutil de fondo para mejorar legibilidad en PC */
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.3) 0%, 
                transparent 30%, 
                transparent 70%, 
                rgba(0,0,0,0.4) 100%);
        }

        /* --- 5. BOTONES DE GRAN ESCALA (ORDENADOR) --- */
        .buttons { display: flex; gap: 60px; }
        
        .btn { 
            display: inline-block;
            padding: 50px 150px; /* TAMAÑO EXTRA GRANDE */
            border: 2px solid rgba(255,255,255,0.9); 
            color: #fff; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 8px; /* Espaciado premium */
            font-size: 1.2rem; /* Letra imponente */
            font-weight: 300;
            border-radius: 100px; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            background: rgba(0,0,0,0.1); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .btn:hover { 
            background: #fff; 
            color: #000; 
            transform: scale(1.08) translateY(-5px); 
            box-shadow: 0 20px 40px rgba(255,255,255,0.1);
        }

        /* --- 6. OPTIMIZACIÓN CRÍTICA PARA MÓVIL (CORRECCIONES) --- */
        @media (max-width: 768px) {
            /* Nombre ajustado a pantalla pequeña */
            .brand { top: 10vh; }
            .brand h1 { font-size: 1.2rem; letter-spacing: 15px; text-indent: 15px; }

            /* EL VÍDEO 70% CENTRADO PERFECTO */
            .vimeo-wrapper iframe { 
                height: 70vh; 
                width: 177.77vh; /* Mantiene el aspect ratio para no deformar */
                top: 0; 
                left: 50%; 
                transform: translateX(-50%); /* Centrado horizontal absoluto */
            }

            /* EL DEGRADADO QUE FUNDE AL 100% (EL BLEND) */
            .overlay { 
                background: linear-gradient(to bottom, 
                    rgba(0,0,0,0) 0%, 
                    rgba(0,0,0,0) 40%,        /* Empieza la transparencia */
                    rgba(0,0,0,0.6) 55%,      /* Empieza a oscurecer sobre el vídeo */
                    rgba(0,0,0,0.9) 68%,      /* Casi negro en el borde del vídeo */
                    rgba(0,0,0,1) 72%,        /* NEGRO TOTAL justo donde acaba el vídeo */
                    #000 100%);               /* Sólido hasta el final */
                padding-bottom: 8vh;
                justify-content: flex-end;
            }

            .buttons { 
                flex-direction: column; 
                width: 85%; 
                gap: 20px; 
            }

            .btn { 
                padding: 24px; 
                font-size: 1.1rem; 
                letter-spacing: 5px;
                width: 100%; 
                text-align: center; 
                border-width: 1.5px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="brand">
        <h1>HUGO RETA</h1>
    </div>

    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/1175946451?background=1&autoplay=1&loop=1&muted=1&autopause=0" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="overlay">
        <div class="buttons">
            <a href="portfolio.html" class="btn">Portfolio</a>
            <a href="myself.html" class="btn">Myself</a>
        </div>
    </div>

</body>
</html>
