<!DOCTYPE HTML>
<html lang="es">
<head>
    <title>PORTFOLIO | HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* --- 1. RESET Y FUNDAMENTOS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 2. NAVEGACIÓN CINEMATOGRÁFICA --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            mix-blend-mode: difference; /* El texto cambia de color según el fondo */
        }
        nav a {
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.65rem;
            font-weight: 300;
            transition: opacity 0.4s ease;
        }
        nav a:hover { opacity: 0.5; }

        /* --- 3. ESTRUCTURA DEL PORTFOLIO --- */
        .container {
            width: 100%;
            padding: 150px 0;
        }

        /* Título de sección sutil */
        .section-header {
            padding: 0 60px 80px 60px;
            max-width: 1200px;
        }
        .section-header h2 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 12px;
            font-weight: 200;
            color: rgba(255,255,255,0.4);
        }

        /* Grid Dinámico de Imágenes */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 200px; /* Mucho aire entre piezas para dar importancia */
            align-items: center;
        }

        /* Cada Item del Portfolio */
        .item {
            position: relative;
            width: 70%; /* En escritorio no ocupa todo el ancho, respira */
            max-width: 1100px;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* El marco de la imagen */
        .image-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            background: #0a0a0a;
            aspect-ratio: 16 / 9; /* Proporción de cine */
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s ease;
            filter: saturate(0.8);
        }

        .item:hover img {
            transform: scale(1.05);
            filter: saturate(1);
        }

        /* Detalles de texto lateral (Estilo negativo de película) */
        .meta-data {
            position: absolute;
            top: 0;
            right: -40px;
            height: 100%;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-size: 0.55rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.2);
            font-weight: 300;
        }

        /* Título del proyecto bajo la foto */
        .project-title {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .project-title h3 {
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .project-title span {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
        }

        /* --- 4. RESPONSIVE (MÓVIL) --- */
        @media (max-width: 768px) {
            nav { padding: 30px 25px; }
            .container { padding: 120px 0; }
            .section-header { padding: 0 25px 50px 25px; }
            
            .item { 
                width: 90%; /* En móvil aprovechamos más la pantalla */
                gap: 100px; 
            }
            .gallery { gap: 120px; }
            
            .image-wrapper { aspect-ratio: 4 / 5; /* En móvil, fotos más verticales funcionan mejor */ }
            
            .meta-data { display: none; } /* Quitamos el texto vertical para limpiar */
            
            .project-title h3 { font-size: 0.75rem; }
        }

        /* --- 5. FOOTER --- */
        footer {
            padding: 100px 60px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        footer p {
            font-size: 0.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">← INDEX</a>
        <a href="myself.html">MYSELF</a>
    </nav>

    <div class="container">
        
        <header class="section-header">
            <h2>Selected Works</h2>
        </header>

        <main class="gallery">

            <article class="item">
                <div class="image-wrapper">
                    <img src="foto1.jpg" alt="Hugo Reta Photography">
                    <div class="meta-data">Lanzarote // Project 01</div>
                </div>
                <div class="project-title">
                    <h3>Island Textures</h3>
                    <span>2026</span>
                </div>
            </article>

            <article class="item">
                <div class="image-wrapper">
                    <img src="foto2.jpg" alt="Hugo Reta Photography">
                    <div class="meta-data">Production // Studio</div>
                </div>
                <div class="project-title">
                    <h3>Inner Shadows</h3>
                    <span>Film Still</span>
                </div>
            </article>

            <article class="item">
                <div class="image-wrapper">
                    <img src="foto3.jpg" alt="Hugo Reta Photography">
                    <div class="meta-data">Editorial // Fashion</div>
                </div>
                <div class="project-title">
                    <h3>Velvet Noir</h3>
                    <span>Editorial</span>
                </div>
            </article>

            <article class="item">
                <div class="image-wrapper">
                    <img src="foto4.jpg" alt="Hugo Reta Photography">
                    <div class="meta-data">Landscape // Cinematic</div>
                </div>
                <div class="project-title">
                    <h3>Horizon Drift</h3>
                    <span>Personal Project</span>
                </div>
            </article>

        </main>
    </div>

    <footer>
        <p>&copy; 2026 HUGO RETA. All Rights Reserved.</p>
    </footer>

</body>
</html>
