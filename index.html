<!DOCTYPE HTML>
<html lang="es">
<head>
    <title>HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- 1. BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Arial, sans-serif; }

        /* --- 2. ORDENADOR (ESTRICTAMENTE IGUAL) --- */
        .brand { position: absolute; top: 80px; width: 100%; text-align: center; z-index: 100; }
        .brand h1 { color: #fff; font-size: 16px; font-weight: 200; letter-spacing: 18px; text-transform: uppercase; text-indent: 18px; opacity: 0.85; }

        .vimeo-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .vimeo-wrapper iframe { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; }

        .overlay { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 90px; }
        .buttons { display: flex; gap: 40px; }
        .btn { padding: 14px 40px; border: 1px solid rgba(255,255,255,0.4); color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 4px; font-size: 13px; font-weight: 300; border-radius: 50px; background: rgba(0,0,0,0.1); backdrop-filter: blur(10px); transition: 0.4s; }
        .btn:hover { background: #fff; color: #000; border-color: #fff; }

        .social-icons { display: flex; gap: 30px; margin-top: 30px; }
        .social-icons a { color: rgba(255,255,255,0.4); font-size: 20px; text-decoration: none; }

      /* --- 3. MÓVIL (IMAGEN ESTÁTICA Y DISEÑO LIMPIO) --- */
@media (max-width: 768px) {
    .vimeo-wrapper { display: none !important; }

    body { 
        background-image: url('DSC00518 (1).jpg') !important; 
        background-size: cover !important;
        background-position: center center !important;
        background-repeat: no-repeat !important;
        background-attachment: fixed !important;
    }

    .brand { top: 50px !important; }
    .brand h1 { font-size: 12px !important; letter-spacing: 10px !important; text-indent: 10px !important; }

    .overlay { 
        height: 100vh !important;
        /* SUBIMOS LOS BOTONES: cambiamos padding-bottom de 60px a 120px */
        padding-bottom: 120px !important; 
        display: flex !important;
        flex-direction: column !important;
        justify-content: flex-end !important;
        align-items: center !important;
        background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,0.5) 100%) !important;
    }

    .buttons { 
        flex-direction: column !important; 
        width: 80% !important; 
        gap: 15px !important; 
        margin-bottom: -20px !important; /* Espacio entre botones y redes */
    }

    .btn { 
        padding: 18px !important; 
        font-size: 14px !important; 
        width: 100% !important; 
        text-align: center !important; 
        background: rgba(0,0,0,0.2) !important;
    }

    /* REDES SOCIALES: Pequeñas, blancas y centradas abajo */
    .social-icons { 
        display: flex !important;
        gap: 30px !important; 
        justify-content: center !important;
        width: 100% !important;
    }

    .social-icons a { 
        font-size: 18px !important; /* Más pequeñas */
        color: #ffffff !important;  /* Blanco puro */
        opacity: 0.8 !important;    /* Un pelín de transparencia para que sea elegante */
    }
}
    </style>
</head>
<body>
    <div class="brand"><h1>HUGO RETA</h1></div>
    
    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/1175946451?background=1&autoplay=1&loop=1&muted=1" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="overlay">
        <div class="buttons">
            <a href="portfolio.html" class="btn">Portfolio</a>
            <a href="myself.html" class="btn">Myself</a>
        </div>
        
        <div class="social-icons">
            <a href="https://instagram.com/tu_usuario" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://tiktok.com/@tu_usuario" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>
</body>
</html>
