<!DOCTYPE HTML>
<html lang="es">
<head>
    <title>HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* NOMBRE ARRIBA - ESCALA PROFESIONAL PC */
        .brand {
            position: absolute;
            top: 12vh;
            width: 100%;
            text-align: center;
            z-index: 30;
        }
        .brand h1 {
            color: #fff;
            font-size: 2.2rem; /* Letra más grande en PC */
            font-weight: 200;
            letter-spacing: 30px; /* Interlineado de autor */
            text-transform: uppercase;
            text-indent: 30px;
            opacity: 0.9;
        }

        /* VIDEO */
        .vimeo-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        
        /* Pantalla completa en ordenador */
        @media (min-width: 769px) {
            .vimeo-wrapper iframe { 
                width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; 
                position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            }
        }

        /* INTERFAZ */
        .overlay { 
            position: relative; z-index: 10; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; padding-bottom: 12vh;
        }
        
        /* BOTONES GRANDES PC */
        .buttons { display: flex; gap: 50px; margin-bottom: 20px; }
        .btn { 
            padding: 25px 70px; /* Botones masivos y elegantes */
            border: 1.5px solid #fff; 
            color: #fff; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            font-size: 1.1rem; /* Letra grande y legible */
            border-radius: 100px; 
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1); 
            background: rgba(0,0,0,0.1); 
            backdrop-filter: blur(15px);
        }
        .btn:hover { background: #fff; color: #000; transform: scale(1.08); }

        /* --- MÓVIL: RECUPERANDO EL 70/30 Y EL BLEND --- */
        @media (max-width: 768px) {
            .brand { top: 8vh; }
            .brand h1 { font-size: 1.1rem; letter-spacing: 14px; text-indent: 14px; }

            .vimeo-wrapper iframe { 
                height: 70vh; /* 70% de la pantalla */
                width: 177.77vh; 
                top: 0; left: 50%; transform: translateX(-50%); 
            }

            .overlay { 
                /* DIFUMINADO / BLEND: El negro sube para fundirse con el video */
                background: linear-gradient(to bottom, 
                    rgba(0,0,0,0) 0%, 
                    rgba(0,0,0,0) 45%, 
                    rgba(0,0,0,0.7) 65%, 
                    rgba(0,0,0,1) 85%,
                    #000 100%); 
                padding-bottom: 10vh;
            }
            .buttons { flex-direction: column; width: 85%; gap: 18px; }
            .btn { padding: 22px; font-size: 1rem; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="brand"><h1>HUGO RETA</h1></div>
    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/1175946451?background=1&autoplay=1&loop=1&muted=1" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>
    <div class="overlay"><div class="buttons"><a href="portfolio.html" class="btn">Portfolio</a><a href="myself.html" class="btn">Myself</a></div></div>
</body>
</html>
