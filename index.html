<!DOCTYPE HTML>
<html>
<head>
    <title>HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. BASE */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* 2. VÍDEO DE FONDO FULLSCREEN */
        .vimeo-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .vimeo-wrapper iframe { 
            width: 100vw; height: 56.25vw; 
            min-height: 100vh; min-width: 177.77vh; 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
        }

        /* 3. CAPA DE INTERFAZ */
        .overlay { 
            position: relative; z-index: 10; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; 
            box-sizing: border-box;
            background: rgba(0,0,0,0.1); 
        }
        
        /* 4. BOTONES PARA ORDENADOR (ESCALA GRANDE) */
        .buttons { 
            display: flex; 
            gap: 30px; 
            margin-bottom: 80px; /* Separación del borde inferior en PC */
        }

        .btn { 
            padding: 15px 45px; /* Botones más largos y elegantes */
            border: 1px solid rgba(255,255,255,0.7); 
            color: white; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.85rem; /* Tamaño de letra premium para PC */
            border-radius: 50px; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            background: rgba(0,0,0,0.2); 
            backdrop-filter: blur(8px);
        }

        .btn:hover { 
            background: white; 
            color: black; 
            border-color: white; 
            transform: translateY(-3px); /* Pequeña elevación al pasar el ratón */
        }

        /* 5. AJUSTE AUTOMÁTICO PARA MÓVIL (SIN ROMPER EL PC) */
        @media (max-width: 768px) {
            .vimeo-wrapper iframe { 
                height: 70vh; top: 0; transform: translateX(-50%); 
            }
            .overlay { 
                background: linear-gradient(to bottom, transparent 50%, #000 100%); 
                padding-bottom: 12vh;
            }
            .buttons { flex-direction: column; width: 85%; gap: 15px; margin-bottom: 0; }
            .btn { padding: 20px; font-size: 0.9rem; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/11759464517?background=1&autoplay=1&loop=1&byline=0&title=0&muted=1&autopause=0" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="overlay">
        <div class="buttons">
            <a href="portfolio.html" class="btn">Portfolio</a>
            <a href="myself.html" class="btn">Myself</a>
        </div>
    </div>

</body>
</html>
