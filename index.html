<!DOCTYPE HTML>
<html>
<head>
    <title>HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        .vimeo-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        
        .overlay { 
            position: relative; z-index: 10; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; 
            box-sizing: border-box;
        }
        
        .buttons { display: flex; gap: 20px; }
        .btn { 
            padding: 10px 30px; 
            border: 1px solid rgba(255,255,255,0.7); 
            color: white; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.75rem; 
            border-radius: 50px; 
            transition: all 0.4s ease; 
            background: rgba(0,0,0,0.2); 
            backdrop-filter: blur(4px); 
            text-align: center;
        }
        .btn:hover { background: white; color: black; border-color: white; }

        /* --- ORDENADOR (SIN CAMBIOS) --- */
        @media (min-width: 769px) {
            .vimeo-wrapper iframe { 
                width: 100vw; height: 56.25vw; 
                min-height: 100vh; min-width: 177.77vh; 
                position: absolute; top: 50%; left: 50%; 
                transform: translate(-50%, -50%); 
            }
            .overlay { padding-bottom: 60px; }
        }

        /* --- MÓVIL (70% VÍDEO - 30% BOTONES CON GRADIENT) --- */
        @media (max-width: 768px) {
            .vimeo-wrapper iframe { 
                width: 177.77vh; /* Mantiene proporción 16:9 ocupando el ancho */
                height: 70vh;    /* OCUPA EL 70% DE LA ALTURA */
                position: absolute; 
                top: 0; 
                left: 50%; 
                transform: translateX(-50%); 
            }

            .overlay { 
                /* GRADIENT: Empieza transparente y se vuelve negro justo donde acaba el video */
                background: linear-gradient(to bottom, 
                    rgba(0,0,0,0) 0%, 
                    rgba(0,0,0,0) 50%, 
                    rgba(0,0,0,0.8) 70%, 
                    rgba(0,0,0,1) 100%); 
                padding-bottom: 8vh; 
            }

            .buttons { 
                flex-direction: column; 
                gap: 12px; 
                width: 85%; 
            }
            .btn { 
                padding: 16px 20px; 
                font-size: 0.8rem; 
            }
        }
    </style>
</head>
<body>

    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/1175946451?background=1&autoplay=1&loop=1&byline=0&title=0&muted=1&autopause=0" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="overlay">
        <div class="buttons">
            <a href="portfolio.html" class="btn">Portfolio</a>
            <a href="myself.html" class="btn">Myself</a>
        </div>
    </div>

</body>
</html>
