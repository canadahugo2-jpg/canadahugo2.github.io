<!DOCTYPE HTML>
<html>
<head>
    <title>HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. Reset de pantalla completa */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* 2. El vídeo de fondo (Capa inferior) */
        .vimeo-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .vimeo-wrapper iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* 3. La capa de los botones (Abajo en el centro) */
        .overlay { 
            position: relative; 
            z-index: 10; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; /* Los empuja abajo */
            padding-bottom: 60px; /* Distancia del borde inferior */
            box-sizing: border-box;
            background: rgba(0,0,0,0.1); 
        }
        
        /* 4. Contenedor de botones */
        .buttons { display: flex; gap: 20px; }

        /* 5. Estilo Redondeado Minimalista */
        .btn { 
            padding: 10px 30px; 
            border: 1px solid rgba(255,255,255,0.8); 
            color: white; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.75rem; 
            border-radius: 50px; /* Botones redondeados */
            transition: all 0.4s ease; 
            background: rgba(0,0,0,0.2); 
            backdrop-filter: blur(4px); /* Efecto cristal sutil */
        }

        .btn:hover { background: white; color: black; border-color: white; }

        /* Ajuste para móviles */
        @media (max-width: 768px) { .buttons { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>

    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/1175946451?background=1&autoplay=1&loop=1&byline=0&title=0&muted=1&autopause=0" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="overlay">
        <div class="buttons">
            <a href="portfolio.html" class="btn">Portfolio</a>
            <a href="myself.html" class="btn">Myself</a>
        </div>
    </div>

</body>
</html>
