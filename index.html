<!DOCTYPE HTML>
<html lang="es">
<head>
    <title>HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

        /* LOGO ARRIBA: PEQUEÑO Y MINIMALISTA */
        .brand {
            position: absolute;
            top: 10vh;
            width: 100%;
            text-align: center;
            z-index: 100;
        }
        .brand h1 {
            color: #fff;
            font-size: 0.9rem; /* Tamaño pequeño, tipo firma */
            font-weight: 200;
            letter-spacing: 15px; /* Interlineado elegante */
            text-transform: uppercase;
            text-indent: 15px;
            opacity: 0.8;
        }

        /* VÍDEO: CENTRADO TOTAL */
        .vimeo-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .vimeo-wrapper iframe { 
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
        }

        /* INTERFAZ */
        .overlay { 
            position: relative; z-index: 10; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; padding-bottom: 80px;
        }

        /* BOTONES: PEQUEÑOS PERO LEGIBLES (ESTILO PASTILLA) */
        .buttons { display: flex; gap: 30px; }
        .btn { 
            padding: 12px 35px; /* Tamaño contenido, muy minimal */
            border: 1px solid rgba(255,255,255,0.5); 
            color: #fff; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.75rem; /* Letra pequeña pero nítida */
            font-weight: 300;
            border-radius: 40px; 
            background: rgba(0,0,0,0.1); 
            backdrop-filter: blur(10px);
            transition: 0.4s ease;
        }
        .btn:hover { background: #fff; color: #000; border-color: #fff; }

      
            /* VÍDEO: PROPORCIÓN 55/45 PARA QUITAR ZOOM */
            .vimeo-wrapper iframe { 
                height: 55vh !important; /* Bajamos la altura para ganar angular */
                width: 100vw !important;  /* Que ocupe el ancho de la pantalla */
                top: 0; 
                left: 50%; 
                transform: translateX(-50%) !important; 
                object-fit: cover; /* Mantiene la imagen centrada sin deformar */
            }

            /* INTERFAZ Y EL BLEND (FUNDIDO SUAVE) */
            .overlay { 
                /* El negro empieza a subir desde el centro del vídeo para que no haya corte */
                background: linear-gradient(to bottom, 
                    transparent 0%, 
                    transparent 30%, 
                    rgba(0,0,0,0.6) 45%, 
                    rgba(0,0,0,1) 58%, 
                    #000 100%) !important; 
                padding-bottom: 8vh;
                justify-content: flex-end;
            }

            /* BOTONES EN MÓVIL */
            .buttons { 
                flex-direction: column; 
                width: 80%; 
                gap: 15px; 
                margin-bottom: 20px;
            }
            .btn { 
                padding: 18px !important; 
                font-size: 14px !important; 
                width: 100%; 
                text-align: center;
                border-color: rgba(255,255,255,0.3) !important;
            }
        

            .overlay { 
                /* FUNDIDO QUE BLENDEA AL 100% */
                background: linear-gradient(to bottom, 
                    transparent 0%, 
                    transparent 45%, 
                    rgba(0,0,0,0.8) 65%, 
                    #000 85%, 
                    #000 100%); 
                padding-bottom: 60px;
            }

            .buttons { flex-direction: column; width: 75%; gap: 15px; }
            .btn { padding: 18px; font-size: 0.8rem; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="brand">
        <h1>HUGO RETA</h1>
    </div>

    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/1175946451?background=1&autoplay=1&loop=1&muted=1" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="overlay">
        <div class="buttons">
            <a href="portfolio.html" class="btn">Portfolio</a>
            <a href="myself.html" class="btn">Myself</a>
        </div>
    </div>

</body>
</html>
