<!DOCTYPE HTML>
<html lang="es">
<head>
    <title>HUGO RETA</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* --- 1. BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Arial, sans-serif; }

        /* --- 2. DISEÑO PARA ORDENADOR (TU DISEÑO) --- */
        .brand { position: absolute; top: 80px; width: 100%; text-align: center; z-index: 100; }
        .brand h1 { color: #fff; font-size: 16px; font-weight: 200; letter-spacing: 18px; text-transform: uppercase; text-indent: 18px; opacity: 0.85; }

        .vimeo-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .vimeo-wrapper iframe { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; }

        .overlay { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 90px; }
        .buttons { display: flex; gap: 40px; }
        .btn { padding: 14px 40px; border: 1px solid rgba(255,255,255,0.4); color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 4px; font-size: 13px; font-weight: 300; border-radius: 50px; background: rgba(0,0,0,0.1); backdrop-filter: blur(10px); transition: 0.4s; }
        .btn:hover { background: #fff; color: #000; border-color: #fff; }

       /* --- AJUSTE RADICAL SOLO PARA MÓVIL --- */
        @media (max-width: 768px) {
            .brand { top: 45px !important; }
            .brand h1 { font-size: 11px !important; letter-spacing: 10px !important; }

            /* Contenedor al 55% de altura real */
            .vimeo-wrapper { 
                height: 55vh !important; 
                width: 100% !important;
                position: absolute !important;
                top: 0 !important;
                overflow: hidden !important;
                background: #000 !important;
            }

            /* El vídeo se ajusta para que el 100% quepa en ese 55vh */
            .vimeo-wrapper iframe { 
                width: 100vw !important;
                height: 56.25vw !important; /* Mantiene la proporción 16:9 exacta */
                min-height: 55vh !important; /* Se asegura de cubrir el alto */
                object-fit: contain !important; /* EVITA EL ZOOM: Encaja el vídeo */
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) !important;
            }

           .overlay { 
                height: 100% !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: flex-end !important;
                align-items: center !important;
                
                /* SUBIMOS LOS BOTONES: Cambia el valor aquí */
                padding-bottom: 120px !important; 
                
                background: linear-gradient(to bottom, 
                    transparent 0%, 
                    transparent 35%, 
                    rgba(0,0,0,0.8) 50%, 
                    #000 65%, 
                    #000 100%) !important; 
            }

           .buttons { 
                display: flex !important;
                flex-direction: column !important; 
                align-items: center !important; /* ESTO CENTRA LOS BOTONES */
                width: 80% !important; 
                gap: 15px !important; 
                margin: 0 auto !important; /* ESTO CENTRA EL BLOQUE ENTERO */
            }
            .btn { 
                padding: 18px !important; 
                font-size: 14px !important; 
                width: 100% !important; 
                text-align: center !important;
                border: 1px solid rgba(255,255,255,0.2) !important;
            }
        }
    </style>
</head>
<body>
    <div class="brand"><h1>HUGO RETA</h1></div>
    <div class="vimeo-wrapper">
        <iframe src="https://player.vimeo.com/video/1175946451?background=1&autoplay=1&loop=1&muted=1" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>
    <div class="overlay">
        <div class="buttons">
            <a href="portfolio.html" class="btn">Portfolio</a>
            <a href="myself.html" class="btn">Myself</a>
        </div>
    </div>
</body>
</html>
